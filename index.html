<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Receitas</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="navbar">
        <div class="container">
            
            <h1 class="logo">Receitas.com</h1>

            <input type="checkbox" id="menu-toggle">
            <label for="menu-toggle" class="hamburger">
                <span class="line"></span>
                <span class="line"></span>
                <span class="line"></span>
            </label>

            <ul class="menu">
                <li><a href="#">Home</a></li>
                <li><a href="#">Salgados</a></li>
                <li><a href="#">Doces</a></li>
                <li><a href="#">Bebidas</a></li>
                <li><a href="#">Bebidas alcoólicas</a></li>
            </ul>

        </div>
    </nav>

    <main class="container">
        <h1 class="titulo-receitas">Receitas</h1>

        <div class="receitas-grid">

            <div class="card">
                <img src="images (3).jpeg" alt="Bolo recheado">
                <h2>Bolo de creme recheado</h2>
            </div>

            <div class="card">
                <img src="images (6).jpeg" alt="Pudim">
                <h2>Pudim de leite condensado</h2>
            </div>

            <div class="card">
                <img src="51-Brownie-1024x682.jpg" alt="Brownie">
                <h2>Brownie caseiro</h2>
            </div>

            <div class="card">
                <img src="9827-chocolate-chocolate-chip-cookies.jpg" alt="Cookies de chocolate">
                <h2>Cookies de chocolate</h2>
            </div>

            <div class="card">
                <img src="Pipoca-gourmet.jpeg" alt="Pipoca gourmet">
                <h2>Pipoca gourmet</h2>
            </div>

        </div>
    </main>

</body>
</html>
